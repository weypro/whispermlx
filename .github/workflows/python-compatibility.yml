name: Python Compatibility

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest  # Apple Silicon — required for mlx-whisper
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Check lockfile is up to date
        run: uv lock --check

      - name: Install the project
        run: uv sync --all-extras

      - name: Test import
        run: uv run python -c "import whispermlx; print('Successfully imported whispermlx')"
